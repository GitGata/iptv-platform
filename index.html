<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin:0; font-family:Arial; background:#000; color:#fff; }
        #player { width:100%; max-width:100%; background:#000; }
        .container { display:flex; height:100vh; }
        .channels { width:300px; background:#111; overflow-y:auto; }
        .channel { padding:10px; cursor:pointer; border-bottom:1px solid #333; }
        .channel:hover, .channel.active { background:#333; }
        .player-container { flex:1; display:flex; flex-direction:column; }
        video { width:100%; height:100%; }
        h1 { padding:15px; margin:0; background:#1a1a1a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="channels" id="channels"></div>
        <div class="player-container">
            <h1>IPTV Platform</h1>
            <video id="player" controls autoplay></video>
        </div>
    </div>

    <script>
        const playlistUrl = 'http://f6b5b312524f.zatikov.net/playlists/uplist/677a8982c1b6bfd02969c3458189717c/playlist.m3u8';
        const video = document.getElementById('player');
        const channelsList = document.getElementById('channels');

        async function loadPlaylist() {
            try {
                const response = await fetch(playlistUrl);
                const text = await response.text();
                const lines = text.split('\n');
                let channels = [];
                let currentChannel = {};

                for (let line of lines) {
                    if (line.startsWith('#EXTINF:')) {
                        const title = line.split(',').pop().trim();
                        currentChannel = { title };
                    } else if (line && !line.startsWith('#') && currentChannel.title) {
                        currentChannel.url = line.trim();
                        channels.push(currentChannel);
                        currentChannel = {};
                    }
                }

                channelsList.innerHTML = '';
                channels.forEach((ch, index) => {
                    const div = document.createElement('div');
                    div.className = 'channel';
                    div.textContent = ch.title;
                    div.onclick = () => playChannel(ch.url);
                    channelsList.appendChild(div);
                });

                if (channels.length > 0) {
                    playChannel(channels[0].url);
                }
            } catch (e) {
                console.error(e);
                channelsList.innerHTML = '<div style="padding:20px;color:red">Failed to load playlist. Check the link.</div>';
            }
        }

        function playChannel(url) {
            if (Hls.isSupported()) {
                if (video.hls) video.hls.destroy();
                const hls = new Hls();
                video.hls = hls;
                hls.loadSource(url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
            video.play();
        }

        loadPlaylist();
    </script>
</body>
</html>
